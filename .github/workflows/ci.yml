name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  MIX_ENV: test
  CI_OTP_VERSION: '27.0'
  CI_ELIXIR_VERSION: '1.17.3'

jobs:
  test:
    name: Test on OTP ${{matrix.otp}} / Elixir ${{matrix.elixir}}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - otp: '27.0'
            elixir: '1.17.3'
            quality: true
          - otp: '27.0'
            elixir: '1.18.4'
            quality: false
          - otp: '28.1'
            elixir: '1.19.5'
            quality: false
          - otp: '29.0'
            elixir: '1.20.0'
            quality: false
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Elixir
      uses: erlef/setup-beam@v1
      with:
        otp-version: ${{matrix.otp}}
        elixir-version: ${{matrix.elixir}}
    
    - name: Restore dependencies cache
      uses: actions/cache@v4
      with:
        path: deps
        key: ${{ runner.os }}-mix-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('**/mix.lock') }}
        restore-keys: |
          ${{ runner.os }}-mix-${{ matrix.otp }}-${{ matrix.elixir }}-
    
    - name: Install dependencies
      run: mix deps.get
    
    - name: Check formatting
      if: matrix.quality
      run: mix format --check-formatted
    
    - name: Run credo
      if: matrix.quality
      run: mix credo --strict
    
    - name: Check for skipped tests
      if: matrix.quality
      run: ./scripts/check_skip_tags.sh all
    
    - name: Check for unused dependencies
      if: matrix.quality
      run: mix deps.unlock --check-unused
    
    - name: Compile without warnings
      run: mix compile --warnings-as-errors
    
    - name: Run unit and integration tests
      run: mix test --exclude compliance
    
    - name: Run security check
      if: matrix.quality
      run: mix sobelow --skip

  # New compliance test jobs for each MCP version
  compliance-2024-11-05:
    name: MCP 2024-11-05 Compliance
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Elixir
      uses: erlef/setup-beam@v1
      with:
        otp-version: ${{ env.CI_OTP_VERSION }}
        elixir-version: ${{ env.CI_ELIXIR_VERSION }}
    
    - name: Restore dependencies cache
      uses: actions/cache@v4
      with:
        path: deps
        key: ${{ runner.os }}-mix-${{ env.CI_OTP_VERSION }}-${{ env.CI_ELIXIR_VERSION }}-${{ hashFiles('**/mix.lock') }}
        restore-keys: |
          ${{ runner.os }}-mix-${{ env.CI_OTP_VERSION }}-${{ env.CI_ELIXIR_VERSION }}-
    
    - name: Install dependencies
      run: mix deps.get
    
    - name: Compile
      run: mix compile
    
    - name: Run MCP 2024-11-05 compliance tests
      run: mix test.suite compliance
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  compliance-2025-03-26:
    name: MCP 2025-03-26 Compliance
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Elixir
      uses: erlef/setup-beam@v1
      with:
        otp-version: ${{ env.CI_OTP_VERSION }}
        elixir-version: ${{ env.CI_ELIXIR_VERSION }}
    
    - name: Restore dependencies cache
      uses: actions/cache@v4
      with:
        path: deps
        key: ${{ runner.os }}-mix-${{ env.CI_OTP_VERSION }}-${{ env.CI_ELIXIR_VERSION }}-${{ hashFiles('**/mix.lock') }}
        restore-keys: |
          ${{ runner.os }}-mix-${{ env.CI_OTP_VERSION }}-${{ env.CI_ELIXIR_VERSION }}-
    
    - name: Install dependencies
      run: mix deps.get
    
    - name: Compile
      run: mix compile
    
    - name: Run MCP 2025-03-26 compliance tests
      run: mix test.suite compliance
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  compliance-2025-06-18:
    name: MCP 2025-06-18 Compliance
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Elixir
      uses: erlef/setup-beam@v1
      with:
        otp-version: ${{ env.CI_OTP_VERSION }}
        elixir-version: ${{ env.CI_ELIXIR_VERSION }}
    
    - name: Restore dependencies cache
      uses: actions/cache@v4
      with:
        path: deps
        key: ${{ runner.os }}-mix-${{ env.CI_OTP_VERSION }}-${{ env.CI_ELIXIR_VERSION }}-${{ hashFiles('**/mix.lock') }}
        restore-keys: |
          ${{ runner.os }}-mix-${{ env.CI_OTP_VERSION }}-${{ env.CI_ELIXIR_VERSION }}-
    
    - name: Install dependencies
      run: mix deps.get
    
    - name: Compile
      run: mix compile
    
    - name: Run MCP 2025-06-18 compliance tests
      run: mix test.suite compliance
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Combined compliance test job for coverage
  compliance-coverage:
    name: Compliance Test Coverage
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Elixir
      uses: erlef/setup-beam@v1
      with:
        otp-version: ${{ env.CI_OTP_VERSION }}
        elixir-version: ${{ env.CI_ELIXIR_VERSION }}
    
    - name: Restore dependencies cache
      uses: actions/cache@v4
      with:
        path: deps
        key: ${{ runner.os }}-mix-${{ env.CI_OTP_VERSION }}-${{ env.CI_ELIXIR_VERSION }}-${{ hashFiles('**/mix.lock') }}
        restore-keys: |
          ${{ runner.os }}-mix-${{ env.CI_OTP_VERSION }}-${{ env.CI_ELIXIR_VERSION }}-
    
    - name: Install dependencies
      run: mix deps.get
    
    - name: Compile
      run: mix compile
    
    - name: Run all compliance tests with coverage
      run: mix coveralls.github --only compliance
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
  dialyzer:
    name: Dialyzer
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Elixir
      uses: erlef/setup-beam@v1
      with:
        otp-version: ${{ env.CI_OTP_VERSION }}
        elixir-version: ${{ env.CI_ELIXIR_VERSION }}
    
    - name: Restore dependencies cache
      uses: actions/cache@v4
      with:
        path: deps
        key: ${{ runner.os }}-mix-${{ env.CI_OTP_VERSION }}-${{ env.CI_ELIXIR_VERSION }}-${{ hashFiles('**/mix.lock') }}
        restore-keys: |
          ${{ runner.os }}-mix-${{ env.CI_OTP_VERSION }}-${{ env.CI_ELIXIR_VERSION }}-
    
    - name: Restore PLT cache
      uses: actions/cache@v4
      id: plt_cache
      with:
        path: priv/plts
        key: ${{ runner.os }}-plt-${{ env.CI_OTP_VERSION }}-${{ env.CI_ELIXIR_VERSION }}-${{ hashFiles('**/mix.lock') }}
        restore-keys: |
          ${{ runner.os }}-plt-${{ env.CI_OTP_VERSION }}-${{ env.CI_ELIXIR_VERSION }}-
    
    - name: Install dependencies
      run: mix deps.get
    
    - name: Create PLTs
      if: steps.plt_cache.outputs.cache-hit != 'true'
      run: mix dialyzer --plt
    
    - name: Run dialyzer
      run: mix dialyzer --format github
